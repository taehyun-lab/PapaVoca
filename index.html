<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PapaVoca</title>
<meta name="description" content="한가한 갈매기를 위한 단어 학습장">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3182F6">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PapaVoca">

<!-- 카카오톡 등 SNS 링크 공유 미리보기용 (Open Graph) -->
<meta property="og:type" content="website">
<meta property="og:title" content="PapaVoca">
<meta property="og:description" content="한가한 갈매기를 위한 단어 학습장">
<meta property="og:url" content="https://taehyun-lab.github.io/PapaVoca/">
<!-- 카카오톡: 첫 번째 og:image(1200x630)를 우선 인식 -->
<meta property="og:image" content="https://taehyun-lab.github.io/PapaVoca/og-image-1200x630.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<!-- 그 외 서비스(페이스북/트위터 등)용 800x400 -->
<meta property="og:image" content="https://taehyun-lab.github.io/PapaVoca/og-image-800x400.png">
<meta property="og:image:width" content="800">
<meta property="og:image:height" content="400">
<meta property="og:site_name" content="PapaVoca">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="PapaVoca">
<meta name="twitter:description" content="한가한 갈매기를 위한 단어 학습장">
<meta name="twitter:image" content="https://taehyun-lab.github.io/PapaVoca/og-image-1200x630.png">

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="sun"></div>
    <div class="gulls">🕊️</div>
    <div class="brand" id="topbar-title">PapaVoca</div>
    <div class="slogan" id="topbar-sub">한가한 갈매기를 위한 단어 학습장</div>
  </div>

  <div class="content" id="content">
    <!-- JS가 렌더링 -->
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
    <button class="nav-item" data-nav="browse"><span class="nav-icon">📖</span><span class="nav-label">단어장</span></button>
    <button class="nav-item" data-nav="review"><span class="nav-icon">🔁</span><span class="nav-label">복습</span></button>
    <button class="nav-item" data-nav="stats"><span class="nav-icon">📊</span><span class="nav-label">통계</span></button>
    <button class="nav-item" data-nav="settings"><span class="nav-icon">⚙️</span><span class="nav-label">설정</span></button>
  </nav>

  <div class="toast" id="toast"></div>
</div>
<script src="app.js"></script>
</body>
</html>
